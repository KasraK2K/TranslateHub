<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TranslateHub</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Auth screens (login / setup) -->
  <div id="authScreen" style="display:none"></div>

  <!-- Dashboard (shown after login) -->
  <div id="dashboard" style="display:none">
    <header class="app-header">
      <button class="mobile-menu-btn" onclick="app.toggleSidebar()" type="button" aria-label="Open menu">
        <i class="fa-solid fa-bars"></i>
      </button>
      <a class="logo" onclick="app.navigate('projects')" aria-label="TranslateHub home">
        <img src="/logo/logo.png" alt="TranslateHub" class="brand-logo brand-logo-header">
      </a>
      <div class="header-right">
        <div class="theme-switcher" id="themeSwitcher"></div>
        <span class="header-user" id="headerUser"></span>
        <button class="btn btn-sm" onclick="app.logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
      </div>
    </header>

    <div class="dashboard-layout">
      <nav class="sidebar" id="sidebar"></nav>
      <main class="main-content" id="app"></main>
    </div>
    <div class="mobile-sidebar-backdrop" id="mobileSidebarBackdrop" onclick="app.closeSidebar()"></div>
  </div>

  <!-- Modal container -->
  <div class="modal-overlay" id="modalOverlay" onclick="app.closeModal(event)">
    <div class="modal" id="modalContent"></div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="/js/modules/helpers.js"></script>
  <script src="/js/modules/router.js"></script>
  <script src="/js/modules/ui.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
