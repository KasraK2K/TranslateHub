<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TranslateHub</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/favicons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicons/favicon-16x16.png">
  <link rel="icon" href="/favicons/favicon.ico">
  <link rel="manifest" href="/favicons/site.webmanifest">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <script type="importmap">
    {
      "imports": {
        "preact": "/vendor/preact/dist/preact.module.js",
        "preact/hooks": "/vendor/preact/hooks/dist/hooks.module.js",
        "htm": "/vendor/htm/dist/htm.module.js"
      }
    }
  </script>
</head>
<body>
  <!-- Auth screens (login / setup) -->
  <div id="authScreen" style="display:none"></div>

  <!-- Dashboard (shown after login) -->
  <div id="dashboard" style="display:none">
    <header class="app-header">
      <button class="mobile-menu-btn" onclick="app.toggleSidebar()" type="button" aria-label="Open menu">
        <i class="fa-solid fa-bars"></i>
      </button>
      <a class="logo" onclick="app.navigate('projects')" aria-label="TranslateHub home">
        <img src="/logo/logo.png" alt="TranslateHub" class="brand-logo brand-logo-header">
      </a>
      <div class="header-right">
        <button class="quick-action-btn" type="button" onclick="app.openCommandBar()">
          <i class="fa-solid fa-magnifying-glass"></i>
          <span>Quick Actions</span>
          <kbd>⌘K</kbd>
        </button>
        <div class="theme-switcher" id="themeSwitcher"></div>
        <span class="header-user" id="headerUser"></span>
        <button class="btn btn-sm" onclick="app.logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
      </div>
    </header>

    <div class="dashboard-layout">
      <nav class="sidebar" id="sidebar"></nav>
      <main class="main-content" id="app"></main>
    </div>
    <div class="mobile-sidebar-backdrop" id="mobileSidebarBackdrop" onclick="app.closeSidebar()"></div>
  </div>

  <!-- Modal container -->
  <div id="modalRoot"></div>

  <!-- Toast container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Command bar -->
  <div class="command-overlay" id="commandOverlay" onclick="app.closeCommandBar(event)" role="dialog" aria-modal="true" aria-label="Quick actions">
    <div class="command-bar" id="commandBar">
      <div class="command-bar-input-wrap">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input id="commandInput" type="text" aria-label="Search pages projects and actions" placeholder="Search pages, projects, and actions" oninput="app.renderCommandResults(this.value)" onkeydown="app.handleCommandInputKeydown(event)">
        <button class="btn-icon" type="button" onclick="app.closeCommandBar()"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="command-results" id="commandResults" role="listbox" aria-label="Command results"></div>
    </div>
  </div>

  <script src="/js/modules/helpers.js"></script>
  <script src="/js/modules/router.js"></script>
  <script src="/js/modules/ui.js"></script>
  <script src="/js/modules/command-bar.js"></script>
  <script src="/js/modules/accessibility.js"></script>
  <script type="module" src="/js/preact-bridge.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
